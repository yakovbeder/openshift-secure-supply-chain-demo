# CI: static checks for shell, YAML, Kubernetes manifests, kustomize, Dockerfiles, Markdown.
name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          set -euo pipefail
          shellcheck spin-demo.sh cleanup.sh check-status.sh

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install yamllint
        run: pip install --user yamllint

      - name: Run yamllint
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          yamllint -c .yamllint.yml .

  kubeconform:
    name: kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install kubeconform
        env:
          KUBECONFORM_VERSION: v0.6.7
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests under repo/
        run: |
          set -euo pipefail
          find \
            repo/components \
            repo/apps-projects/secure-app/k8s \
            repo/apps-projects/secure-app/.tekton \
            repo/argocd \
            -type f \( -name '*.yaml' -o -name '*.yml' \) -print0 \
            | xargs -0 -r kubeconform -ignore-missing-schemas -summary -output tap

  kustomize-build:
    name: kustomize build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install kustomize
        env:
          KUSTOMIZE_VERSION: v5.5.0
        run: |
          set -euo pipefail
          curl -sSfLo /tmp/kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Build all kustomization overlays
        run: |
          set -euo pipefail
          dirs=(
            repo/components/acs
            repo/components/gitea
            repo/components/gitlab
            repo/components/jenkins
            repo/components/jenkins-app-namespaces
            repo/components/mysql
            repo/components/quay
            repo/components/rhtas-operator
            repo/components/rhtas-securesign
            repo/components/sealed-secrets
            repo/components/sigstore-policy-controller
            repo/apps-projects/secure-app/k8s
          )
          for d in "${dirs[@]}"; do
            echo "==> kustomize build --enable-helm $d"
            # --enable-helm required for repo/components/sealed-secrets (HelmChart inflation)
            kustomize build --enable-helm "$d" >/dev/null
          done

  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: repo/components/jenkins/agent-image/Dockerfile
          failure-threshold: error

      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: repo/apps-projects/secure-app/frontend/Dockerfile
          failure-threshold: error

      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: repo/apps-projects/secure-app/backend/Dockerfile
          failure-threshold: error

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint-cli2.jsonc
          globs: |
            **/*.md
