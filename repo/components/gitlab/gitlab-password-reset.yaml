apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-password-reset
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: gitlab-oidc-setup
      restartPolicy: OnFailure
      containers:
        - name: reset-password
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: NEW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitlab-admin-credentials
                  key: password
          command:
            - /bin/bash
            - -c
            - |
              set -e
              GITLAB_HOST="https://gitlab.__CLUSTER_DOMAIN__"

              echo "Waiting for GitLab API readiness..."
              for i in $(seq 1 60); do
                if curl -sk "${GITLAB_HOST}/-/readiness" 2>/dev/null | grep -q "ok"; then
                  echo "GitLab API ready."
                  break
                fi
                echo "  Attempt ${i}/60..."
                sleep 10
              done

              CURRENT_PASS=$(oc get secret gitlab-gitlab-initial-root-password -n gitlab-system -o jsonpath='{.data.password}' | base64 -d)
              echo "Got initial root password from operator secret."

              echo "Getting OAuth token with current password..."
              TOKEN=$(curl -sk --request POST "${GITLAB_HOST}/oauth/token" \
                --data "grant_type=password" \
                --data "username=root" \
                --data "password=${CURRENT_PASS}" 2>/dev/null \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null)

              if [ -z "${TOKEN}" ]; then
                echo "Trying with desired password (already changed)..."
                TOKEN=$(curl -sk --request POST "${GITLAB_HOST}/oauth/token" \
                  --data "grant_type=password" \
                  --data "username=root" \
                  --data "password=${NEW_PASSWORD}" 2>/dev/null \
                  | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null)
                if [ -n "${TOKEN}" ]; then
                  echo "Password already set to desired value."
                  exit 0
                fi
                echo "ERROR: Could not authenticate with either password"
                exit 1
              fi

              echo "Changing root password via API..."
              RESP=$(curl -sk --request PUT "${GITLAB_HOST}/api/v4/users/1" \
                --header "Authorization: Bearer ${TOKEN}" \
                --data "password=${NEW_PASSWORD}" 2>/dev/null)

              if echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('username')=='root'" 2>/dev/null; then
                echo "SUCCESS — GitLab root password changed to desired value."
              else
                echo "WARNING — Unexpected response: ${RESP}"
                exit 1
              fi

