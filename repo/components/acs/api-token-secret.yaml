# Placeholder secret — the init-api-token-job populates this after Central starts.
# Tekton ClusterTasks (stackrox-image-check, stackrox-image-scan) read from this secret.
apiVersion: v1
kind: Secret
metadata:
  name: stackrox-secret
  namespace: stackrox
  annotations:
    argocd.argoproj.io/sync-wave: "5"
type: Opaque
stringData:
  rox_api_token: "__ACS_API_TOKEN__"
  rox_central_endpoint: "central-stackrox.__CLUSTER_DOMAIN__:443"
