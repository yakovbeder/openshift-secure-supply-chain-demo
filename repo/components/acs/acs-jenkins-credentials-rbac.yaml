# Allows ACS init job (stackrox:acs-init) to create/update acs-rox-credentials secret in jenkins
# so Jenkins pipelines can use ROX_API_TOKEN for roxctl image scan/check.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: acs-init-write-jenkins-secret
  namespace: jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "24"
  labels:
    app.kubernetes.io/part-of: rhtas-demo
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: acs-init-write-jenkins-secret
  namespace: jenkins
  annotations:
    argocd.argoproj.io/sync-wave: "24"
  labels:
    app.kubernetes.io/part-of: rhtas-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: acs-init-write-jenkins-secret
subjects:
  - kind: ServiceAccount
    name: acs-init
    namespace: stackrox