# Desired ACS Central admin password. Change this or replace with a SealedSecret for your choice.
# The acs-reset-admin-password PostSync Job will apply this to central-htpasswd and restart Central.
apiVersion: v1
kind: Secret
metadata:
  name: acs-admin-password
  namespace: stackrox
  annotations:
    argocd.argoproj.io/sync-wave: "25"
type: Opaque
stringData:
  # Set the password you want for ACS admin (e.g. openshift to match other demo services).
  # For production, use a SealedSecret or external secrets.
  password: "openshift"
