# PostSync Job: set ACS Central admin password to the value in acs-admin-password Secret,
# then restart Central so it picks up the new password. Runs before acs-init-api-token so the
# API token is generated using your chosen password.
apiVersion: batch/v1
kind: Job
metadata:
  name: acs-reset-admin-password
  namespace: stackrox
  annotations:
    argocd.argoproj.io/sync-wave: "28"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: acs-init
      restartPolicy: OnFailure
      volumes:
        - name: htpasswd-data
          emptyDir: {}
      initContainers:
        - name: generate-bcrypt
          image: registry.redhat.io/rhel8/httpd-24:latest
          env:
            - name: DESIRED_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: acs-admin-password
                  key: password
          volumeMounts:
            - name: htpasswd-data
              mountPath: /htpasswd-data
          command:
            - /bin/bash
            - -c
            - |
              ENTRY=$(htpasswd -bnBC 10 admin "${DESIRED_PASSWORD}")
              echo "${ENTRY}" > /htpasswd-data/htpasswd
              echo "Generated bcrypt entry: ${ENTRY}"
      containers:
        - name: reset-password
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: CENTRAL_ENDPOINT
              value: "https://central.stackrox.svc:443"
            - name: DESIRED_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: acs-admin-password
                  key: password
          volumeMounts:
            - name: htpasswd-data
              mountPath: /htpasswd-data
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "Waiting for Central to be ready..."
              for i in $(seq 1 60); do
                if curl -sk "${CENTRAL_ENDPOINT}/v1/ping" 2>/dev/null | grep -q "pong"; then
                  echo "Central is ready."
                  break
                fi
                echo "  Attempt ${i}/60..."
                sleep 10
              done

              HTPASSWD_ENTRY=$(cat /htpasswd-data/htpasswd)
              if [ -z "${HTPASSWD_ENTRY}" ]; then
                echo "ERROR: bcrypt hash not generated by init container"
                exit 1
              fi

              echo "Patching central-htpasswd secret with bcrypt hash..."
              echo "  Entry: ${HTPASSWD_ENTRY}"
              oc patch secret central-htpasswd -n stackrox --type merge \
                -p "{\"stringData\":{\"htpasswd\":\"${HTPASSWD_ENTRY}\n\",\"password\":\"${DESIRED_PASSWORD}\"}}"

              echo "Restarting Central..."
              oc rollout restart deployment/central -n stackrox
              oc rollout status deployment/central -n stackrox --timeout=300s

              echo "Verifying login..."
              sleep 15
              HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' "${CENTRAL_ENDPOINT}/v1/auth/status" -u "admin:${DESIRED_PASSWORD}")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "SUCCESS — admin:openshift login verified (HTTP 200)"
              else
                echo "WARNING — login returned HTTP ${HTTP_CODE}; Central may still be restarting"
              fi

              echo "Done."
