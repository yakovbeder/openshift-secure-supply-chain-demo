apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-quay-operator
  namespace: quay
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: quay-operator-wait
      restartPolicy: OnFailure
      containers:
        - name: wait
          image: quay.io/openshift/origin-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for Quay Operator to be ready..."

              # Wait for the operator deployment to exist and be ready
              for i in {1..60}; do
                READY=$(oc get deployment -n quay -l operators.coreos.com/quay-operator.quay -o jsonpath='{.items[0].status.readyReplicas}' 2>/dev/null || echo "0")
                if [ "$READY" != "" ] && [ "$READY" != "0" ]; then
                  echo "Quay Operator is ready (replicas: $READY)"
                  exit 0
                fi
                echo "Waiting for Quay Operator... (attempt $i/60)"
                sleep 10
              done

              echo "Timeout waiting for Quay Operator"
              exit 1
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: quay-operator-wait
  namespace: quay
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quay-operator-wait
  namespace: quay
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quay-operator-wait
  namespace: quay
subjects:
  - kind: ServiceAccount
    name: quay-operator-wait
    namespace: quay
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: quay-operator-wait
