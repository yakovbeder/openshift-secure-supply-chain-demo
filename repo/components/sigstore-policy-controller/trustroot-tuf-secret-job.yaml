apiVersion: v1
kind: ServiceAccount
metadata:
  name: tuf-fetcher
  namespace: policy-controller-operator
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tuf-fetcher
  namespace: policy-controller-operator
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tuf-fetcher
  namespace: policy-controller-operator
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
  - kind: ServiceAccount
    name: tuf-fetcher
    namespace: policy-controller-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tuf-fetcher
---
apiVersion: batch/v1
kind: Job
metadata:
  name: trustroot-fetch-tuf
  namespace: policy-controller-operator
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: tuf-fetcher
      restartPolicy: OnFailure
      containers:
        - name: fetch
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: TUF_URL
              value: "https://tuf-trusted-artifact-signer.__CLUSTER_DOMAIN__"
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for RHTAS TUF to be reachable..."
              for i in $(seq 1 60); do
                if curl -skf "${TUF_URL}/root.json" -o /tmp/root.json 2>/dev/null; then
                  echo "Fetched root.json from TUF"
                  break
                fi
                echo "Attempt $i/60..."
                sleep 10
              done
              if [ ! -f /tmp/root.json ]; then
                echo "WARNING: Could not fetch TUF root.json; tuf-root Secret not updated"
                exit 0
              fi
              echo "Creating tuf-root Secret from TUF root.json..."
              kubectl create secret generic tuf-root \
                --from-file=root=/tmp/root.json \
                --dry-run=client -o yaml -n policy-controller-operator | kubectl apply -f -
              echo "Done. Policy controller can use this Secret when configured with --tuf-root and --tuf-mirror."
              echo "ArgoCD re-sync will re-run this hook to refresh the cert."
