# Production-tagged images must be signed by a release branch pipeline
apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: require-production-release-signature
  labels:
    app.kubernetes.io/part-of: rhtas-demo
    policy-category: identity
  annotations:
    description: "Production images must be signed from release/* branch"
spec:
  images:
    - glob: "registry-quay-quay.__CLUSTER_DOMAIN__/secure-app/**:prod-*"
    - glob: "registry-quay-quay.__CLUSTER_DOMAIN__/secure-app/**:v*"
  authorities:
    - keyless:
        identities:
          - issuer: https://jenkins.__CLUSTER_DOMAIN__/oidc
            subjectRegExp: ".*/job/secure-app/job/release.*"
        trustRootRef: rhtas-trust
  mode: enforce
