# ════════════════════════════════════════════════════════════════════════════════
# GOVERNANCE POLICY: Code Review Attestation
# ════════════════════════════════════════════════════════════════════════════════
#
# Purpose: Verify code was reviewed and approved before build
# Mode: warn (requires VCS integration)
# Priority: 20
#
# This policy ensures:
# - All code changes were peer reviewed
# - Merge requests had required approvals
# - No direct commits to protected branches
# - Four-eyes principle for code changes
#
# Governance requirements met:
# - SOC 2 Type II: Change management controls
# - ISO 27001: A.12.1.2 Change management
# - PCI DSS: Requirement 6.3 Secure development
# - NIST 800-53: CM-3 Configuration change control
#
# GitLab-specific attestation data:
# - Merge Request IID
# - Number of approvals
# - Approver identities
# - Approval timestamp
# - Source/target branches
#
# Pipeline integration:
#   # Extract MR approval data from GitLab CI
#   MR_APPROVALS=$(curl -s "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/approvals" \
#     -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}")
#   
#   echo "{
#     \"mergeRequestIid\": ${CI_MERGE_REQUEST_IID},
#     \"approvedBy\": $(echo $MR_APPROVALS | jq '.approved_by'),
#     \"approvalCount\": $(echo $MR_APPROVALS | jq '.approvals_left == 0'),
#     \"targetBranch\": \"${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}\",
#     \"mergedAt\": \"${CI_COMMIT_TIMESTAMP}\"
#   }" > code-review.json
#   
#   cosign attest --type https://example.com/code-review/v1 --predicate code-review.json ${IMAGE}
#
# ════════════════════════════════════════════════════════════════════════════════

apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: require-code-review
  labels:
    app.kubernetes.io/part-of: rhtas-demo
    policy-category: governance
  annotations:
    description: "Require code review and approval attestation"
    category: "governance-code-review"
    priority: "20"
spec:
  images:
    - glob: default-route-openshift-image-registry.*/secure-app/*:staging-*
    - glob: default-route-openshift-image-registry.*/secure-app/*:prod-*
  authorities:
    - keyless:
        identities:
          - issuer: https://gitlab.__CLUSTER_DOMAIN__
            subjectRegExp: ".*"
          - issuer: https://jenkins.__CLUSTER_DOMAIN__/oidc
            subjectRegExp: ".*secure-app.*"
            subjectRegExp: ".*"
        trustRootRef: rhtas-trust
      attestations:
        - name: code-review
          predicateType: https://example.com/code-review/v1
          policy:
            type: cue
            data: |
              predicateType: "https://example.com/code-review/v1"
              
              predicate: {
                mergeRequestIid?: number
                approvedBy: [...{
                  user?: {
                    username?: string
                    name?: string
                  }
                }]
                approvalCount: bool
                targetBranch: string
                mergedAt?: string
                
                // Require at least one approval
                if len(approvedBy) < 1 {
                  _fail: "Code review requires at least 1 approval"
                }
                
                // For production, require 2 approvals
                if targetBranch == "main" && len(approvedBy) < 2 {
                  _fail: "Production releases require at least 2 approvals"
                }
                
                // Approval must be complete
                if !approvalCount {
                  _fail: "Merge request approvals not complete"
                }
              }
  mode: warn


