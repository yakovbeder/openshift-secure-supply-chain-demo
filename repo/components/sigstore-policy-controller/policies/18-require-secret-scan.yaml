# ════════════════════════════════════════════════════════════════════════════════
# SECURITY POLICY: Secret Scanning Attestation
# ════════════════════════════════════════════════════════════════════════════════
#
# Purpose: Require attestation that image was scanned for leaked secrets
# Mode: warn (requires secret scanning in pipeline)
# Priority: 18
#
# This policy ensures:
# - No hardcoded credentials in image layers
# - No API keys, tokens, or passwords exposed
# - No private keys or certificates leaked
# - No cloud provider secrets embedded
#
# Secret types detected:
# - AWS Access Keys / Secret Keys
# - Azure/GCP Service Account Keys
# - Private SSH/GPG Keys
# - Database Connection Strings
# - API Tokens (GitHub, GitLab, Slack, etc.)
# - JWT Secrets
# - Generic passwords and credentials
#
# Pipeline integration (using Gitleaks, Trufflehog, or similar):
#   # Scan image layers for secrets
#   trufflehog docker --image=${IMAGE} --json > secret-scan.json
#   # Or with Gitleaks
#   gitleaks detect --source=. --report-format=json --report-path=secret-scan.json
#   
#   # Create attestation
#   echo "{\"scanner\": \"trufflehog\", \"findings\": $(cat secret-scan.json), \"status\": \"pass\"}" > secret-attestation.json
#   cosign attest --type https://example.com/secret-scan/v1 --predicate secret-attestation.json ${IMAGE}
#
# ════════════════════════════════════════════════════════════════════════════════

apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: require-secret-scan
  labels:
    app.kubernetes.io/part-of: rhtas-demo
    policy-category: security
  annotations:
    description: "Require secret scanning attestation - no leaked credentials"
    category: "security-secrets"
    priority: "18"
spec:
  images:
    - glob: default-route-openshift-image-registry.*/secure-app/*
  authorities:
    - keyless:
        identities:
          - issuer: https://gitlab.__CLUSTER_DOMAIN__
            subjectRegExp: ".*"
          - issuer: https://jenkins.__CLUSTER_DOMAIN__/oidc
            subjectRegExp: ".*secure-app.*"
            subjectRegExp: ".*"
        trustRootRef: rhtas-trust
      attestations:
        - name: secret-scan
          predicateType: https://example.com/secret-scan/v1
          policy:
            type: cue
            data: |
              predicateType: "https://example.com/secret-scan/v1"
              
              predicate: {
                scanner: string
                scanTimestamp?: string
                status: "pass" | "fail"
                
                findings?: [...{
                  severity?: string
                  type?: string
                  location?: string
                }]
                
                // Count critical/high findings
                _criticalFindings: [ for f in findings if f.severity == "CRITICAL" || f.severity == "HIGH" { f } ]
                
                // Fail if status is not pass or critical findings exist
                if status != "pass" {
                  _fail: "Secret scan did not pass"
                }
                if len(_criticalFindings) > 0 {
                  _fail: "Critical secrets detected in image"
                }
              }
  mode: warn


