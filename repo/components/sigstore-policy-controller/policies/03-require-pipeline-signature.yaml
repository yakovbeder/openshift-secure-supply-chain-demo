# Only accept signatures from Jenkins pipeline OIDC (not manual cosign)
apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: require-pipeline-signature
  labels:
    app.kubernetes.io/part-of: rhtas-demo
    policy-category: identity
  annotations:
    description: "Only accept signatures from Jenkins pipeline OIDC"
spec:
  images:
    - glob: "registry-quay-quay.__CLUSTER_DOMAIN__/secure-app/**"
  authorities:
    - keyless:
        identities:
          - issuer: https://jenkins.__CLUSTER_DOMAIN__/oidc
            subjectRegExp: "https://jenkins.__CLUSTER_DOMAIN__/job/secure-app/.*"
        trustRootRef: rhtas-trust
  mode: enforce
