# ════════════════════════════════════════════════════════════════════════════════
# GOVERNANCE POLICY: Human Approval via Merge Request Verification
# ════════════════════════════════════════════════════════════════════════════════
#
# Purpose: Verify images were built from approved and merged code
# Mode: warn (requires MR approval attestation in pipeline)
# Priority: 24
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ HOW IT WORKS                                                                 │
# ├─────────────────────────────────────────────────────────────────────────────┤
# │                                                                             │
# │  1. Developer creates Merge Request (MR)                                   │
# │  2. Approver reviews and approves MR                                        │
# │  3. Approver/Maintainer merges MR                                           │
# │  4. Pipeline triggered by merge contains:                                   │
# │     - JWT token with merger's identity (user_email, user_login)            │
# │     - CI variables: CI_MERGE_REQUEST_APPROVED, CI_MERGE_REQUEST_IID        │
# │  5. Fulcio certificate contains merger's identity from JWT claims           │
# │  6. Pipeline creates approval attestation with MR data                      │
# │  7. Policy verifies both signature identity AND approval attestation        │
# │                                                                             │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# GitLab OIDC JWT Claims Available (extracted by Fulcio):
# ─────────────────────────────────────────────────────────
# - sub: project_path:root/secure-app:ref_type:branch:ref:main
# - namespace_path: root
# - project_path: root/secure-app
# - user_email: approver@company.com (WHO triggered the pipeline)
# - user_login: approver_username
# - pipeline_source: merge_request_event | push
# - ref_type: branch | tag
# - ref: main | develop | v1.0.0
# - ci_config_ref_uri: gitlab.example.com/root/secure-app//.gitlab-ci.yml@...
#
# Fulcio Certificate Extensions (OID 1.3.6.1.4.1.57264.1.x):
# ─────────────────────────────────────────────────────────
# - Build Signer URI (the CI config path)
# - Build Signer Digest
# - Runner Environment
# - Source Repository URI
# - Source Repository Digest
# - Build Config URI
# - Build Config Digest
# - Build Trigger
# - Run Invocation URI
#
# The key insight: When someone MERGES an MR, THEY trigger the pipeline,
# so their identity (email/username) is in the JWT token and certificate.
# This proves a human (the merger) initiated the build.
#
# Pipeline Integration:
# ─────────────────────
# See .gitlab/ci/templates/approval-attestation.yml for implementation
#
# ════════════════════════════════════════════════════════════════════════════════

apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: require-human-approval
  labels:
    app.kubernetes.io/part-of: rhtas-demo
    policy-category: governance
  annotations:
    description: "Require human approval via MR merge verification"
    category: "governance-human-approval"
    priority: "24"
spec:
  images:
    - glob: default-route-openshift-image-registry.*/secure-app/*:staging-*
    - glob: default-route-openshift-image-registry.*/secure-app/*:prod-*
    - glob: default-route-openshift-image-registry.*/secure-app/*:v*
  authorities:
    - keyless:
        identities:
          - issuer: https://gitlab.__CLUSTER_DOMAIN__
            subjectRegExp: ".*"
          - issuer: https://jenkins.__CLUSTER_DOMAIN__/oidc
            subjectRegExp: ".*secure-app.*"
            subjectRegExp: ".*"
        trustRootRef: rhtas-trust
      attestations:
        - name: merge-request-approval
          predicateType: https://example.com/merge-request-approval/v1
          policy:
            type: cue
            data: |
              predicateType: "https://example.com/merge-request-approval/v1"
              
              predicate: {
                // Pipeline source must indicate it came from a merge
                pipelineSource: "merge_request_event" | "push"
                
                // MR must have been approved
                mergeRequest: {
                  iid: number
                  approved: true
                  approvalCount: number
                  approvedBy: [...{
                    username: string
                    email?: string
                  }]
                  mergedBy: {
                    username: string
                    email: string
                  }
                  targetBranch: string
                  mergedAt: string
                }
                
                // Triggering user info (from JWT claims)
                triggeredBy: {
                  username: string
                  email: string
                }
                
                // Build info
                build: {
                  pipelineId: number
                  jobId: number
                  commitSha: string
                  ref: string
                }
                
                // Require at least 1 approval
                if mergeRequest.approvalCount < 1 {
                  _fail: "Merge request requires at least 1 approval"
                }
                
                // For production (main branch), require 2 approvals
                if mergeRequest.targetBranch == "main" && mergeRequest.approvalCount < 2 {
                  _fail: "Production releases require at least 2 approvals"
                }
                
                // MR must be approved
                if !mergeRequest.approved {
                  _fail: "Merge request was not approved"
                }
                
                // Verify merger is not the same as author (prevent self-merge)
                // This is enforced in GitLab settings but double-checked here
              }
  mode: warn
